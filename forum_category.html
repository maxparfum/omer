  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
      font-family: 'Cinzel', serif;
      background-color: black;
      color: #FFFFFF;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 40px;
    }

    .back-button {
      display: inline-block;
      color: #C59849;
      text-decoration: none;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: color 0.3s;
    }

    .back-button:hover {
      color: #D5A856;
    }

    .category-header {
      margin-bottom: 40px;
    }

    .category-title {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      color: #C59849;
      margin-bottom: 10px;
    }

    .category-description {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
      color: #C2C2C2;
      margin-bottom: 30px;
    }

    .new-thread-btn {
      background: linear-gradient(135deg, #2C130B, #4a2619);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: none;
    }

    .new-thread-btn.visible {
      display: inline-block;
    }

    .new-thread-btn:hover {
      background: linear-gradient(135deg, #4a2619, #6b3829);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(44, 19, 11, 0.3);
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      color: #FFFFFF;
      margin-bottom: 30px;
      margin-top: 40px;
    }

    .loading-state,
    .error-state,
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-family: 'Montserrat', sans-serif;
      font-size: 1.1rem;
    }

    .error-state {
      color: #ff6b6b;
    }

    .threads-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .thread-card {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 1px solid #444;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .thread-card:hover {
      transform: translateY(-3px);
      border-color: #C59849;
      box-shadow: 0 10px 30px rgba(197, 152, 73, 0.2);
    }

    .thread-title {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: #C59849;
      margin-bottom: 12px;
    }

    .thread-preview {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      color: #999;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .thread-meta {
      display: flex;
      gap: 24px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      color: #999;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hidden {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.9);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      max-width: 600px;
      width: 100%;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border: 1px solid #444;
      border-radius: 12px;
      padding: 30px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: #C59849;
    }

    .modal-close {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 2rem;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background-color 0.3s ease;
    }

    .modal-close:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      color: #C2C2C2;
      margin-bottom: 8px;
      display: block;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #444;
      border-radius: 8px;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #C59849;
    }

    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }

    .error-message {
      color: #ff6b6b;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      margin-top: 8px;
      display: none;
    }

    .error-message.visible {
      display: block;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2C130B, #4a2619);
      color: white;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #4a2619, #6b3829);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(44, 19, 11, 0.3);
    }

    .btn-secondary {
      background: #444;
      color: white;
    }

    .btn-secondary:hover {
      background: #555;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .container {
        padding: 90px 15px 30px;
      }

      .category-title {
        font-size: 2rem;
      }

      .section-title {
        font-size: 1.5rem;
      }

      .thread-card {
        padding: 20px;
      }

      .thread-title {
        font-size: 1.2rem;
      }

      .thread-preview {
        font-size: 0.9rem;
        margin-bottom: 12px;
      }

      .modal {
        padding: 20px;
      }

      .modal-title {
        font-size: 1.4rem;
      }
    }
  </style>

<body>
  <div id="navbar-container"></div>

  <!-- Notifications Dropdown -->
  <div class="notifications-dropdown hidden" id="notifications-dropdown">
    <div class="notifications-header">
      <h3 class="notifications-title">Notifications</h3>
      <button class="mark-all-read-btn" id="mark-all-read-btn">Mark all as read</button>
    </div>
    <div class="notifications-list" id="notifications-list">
      <div class="notifications-loading">Loading...</div>
    </div>
  </div>

  <div class="container">
    <a href="forum.html" class="back-button">← Back to Forum</a>

    <div id="loading-state" class="loading-state">
      Loading category...
    </div>

    <div id="error-state" class="error-state hidden">
      Failed to load category. Please try again later.
    </div>

    <div id="category-content" class="hidden">
      <div class="category-header">
        <h1 class="category-title" id="categoryTitle">Loading...</h1>
        <p class="category-description" id="categoryDescription"></p>
        <button class="new-thread-btn" id="newThreadBtn">+ New Thread</button>
      </div>

      <h2 class="section-title">Threads</h2>

      <div id="threads-container">
        <div class="empty-state">No threads yet. Be the first to start one!</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="newThreadModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Create New Thread</h2>
        <button class="modal-close" id="closeModalBtn">&times;</button>
      </div>

      <form id="newThreadForm">
        <div class="form-group">
          <label class="form-label" for="threadTitle">Thread Title</label>
          <input type="text" id="threadTitle" class="form-input" placeholder="Enter thread title..." required />
          <div class="error-message" id="titleError">Please enter a thread title</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="threadBody">First Post</label>
          <textarea id="threadBody" class="form-textarea" placeholder="Share your thoughts..." required></textarea>
          <div class="error-message" id="bodyError">Please enter post content</div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="createThreadBtn">Create Thread</button>
        </div>
      </form>
    </div>
  </div>
  <script src="navbar-loader.js"></script>
  <script type="module" src="forum_category.js"></script>
  <script type="module" src="nav_profile.js"></script>
