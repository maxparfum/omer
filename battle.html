  <script type="module">

const SUPABASE_ANON_KEY =
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vYXpzd2ZrbHB2b3BlcmthcmxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjM3MDc2MTYsImV4cCI6MjA3OTI4MzYxNn0.7_xrCWwV_elxQ0i4bdQ9Hsv-HGB-qz30a__1aeJ4QiM';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    async function trackUserBattleCompletionAndPoints() {
  try {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;

    const { error: insertError } = await supabase
      .from('user_fragrance_battle_results')
      .insert({
        user_id: user.id
      });

    if (insertError) throw insertError;

    const { count, error: countError } = await supabase
      .from('user_fragrance_battle_results')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', user.id);

    if (countError) throw countError;

    const totalBattles = count || 0;

    if (totalBattles > 0 && totalBattles % 10 === 0) {
      const milestoneNumber = totalBattles / 10;

      await awardPoints(
        'fragrance_battle_milestone',
        'battle_milestone',
        `${user.id}:${milestoneNumber}`,
        user.id,
        5
      );
    }
  } catch (err) {
    console.error('Error tracking user battle completion:', err);
  }
}

    let fragrances = [];
    let filteredFragrances = [];
    let fragranceIndex = new Map(); // Lookup by "name|brand"
    let leaderboardReqId = 0; // Prevent stale leaderboard renders
    let currentChampion = null;
    let currentStreak = 0;
    let isAnimating = false;
    let currentCategory = 'Top Rated';
    let usedFragrancePairs = new Set();

    function getCurrentMonth() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    }

    function categorizeFragrance(fragrance) {
      const brand = (fragrance.brand || '').toLowerCase();
      const name = (fragrance.name || '').toLowerCase();
      const accords = (fragrance.main_accords || []).map(a => a.toLowerCase());
      const gender = (fragrance.gender || '').toLowerCase();

      const categories = [];

      // Brand categories
      if (brand.includes('louis vuitton')) categories.push('Louis Vuitton');
      if (brand.includes('dior')) categories.push('Dior');
      if (brand.includes('creed')) categories.push('Creed');
      if (brand.includes('armaf')) categories.push('Armaf');

      // Occasion categories
      if (accords.some(a => a.includes('sweet') || a.includes('vanilla') || a.includes('amber') || a.includes('rose'))) {
        categories.push('Date Night');
      }
      if (accords.some(a => a.includes('fresh') || a.includes('citrus') || a.includes('aquatic') || a.includes('green'))) {
        categories.push('Office');
      }
      if (accords.some(a => a.includes('woody') || a.includes('spicy') || a.includes('leather') || a.includes('tobacco'))) {
        categories.push('Partying');
      }

      // Gender categories - case-insensitive and precise matching
const genderLower = gender.toLowerCase().trim();

// Check for men's fragrances
if (
  genderLower === 'men' ||
  genderLower === 'male' ||
  genderLower.includes("for men") ||
  (genderLower.includes('men') && !genderLower.includes('women'))
) {
  categories.push("Men's");
}

// Check for women's fragrances
if (
  genderLower === 'women' ||
  genderLower === 'woman' ||
  genderLower === 'female' ||
  genderLower.includes("for women") ||
  (genderLower.includes('women') && !genderLower.includes('men'))
) {
  categories.push("Women's");
}

// Check for unisex
if (
  genderLower.includes('unisex') ||
  genderLower === '' ||
  (genderLower.includes('men') && genderLower.includes('women'))
) {
  categories.push('Unisex');
}

      return categories;
    }

    async function loadFragrances() {
      try {
        const response = await fetch('fragrances_merged.json');
        const data = await response.json();
        fragrances = data.filter(f => f.image && f.main_accords && f.main_accords.length > 0);

        // Assign categories to each fragrance
        fragrances = fragrances.map(f => ({
          ...f,
          categories: categorizeFragrance(f)
        }));

        // Build fragrance lookup index by name|brand
        fragranceIndex.clear();
        fragrances.forEach(f => {
          const key = `${(f.name || '').trim().toLowerCase()}|${(f.brand || '').trim().toLowerCase()}`;
          fragranceIndex.set(key, f);
        });

        if (fragrances.length < 2) {
          document.getElementById('battleArea').innerHTML = '<div class="loading-message">Not enough fragrances available for battle.</div>';
          return;
        }

        applyFilter('Top Rated');
        setupFilterButtons();
        loadLeaderboard();
      } catch (error) {
        console.error('Error loading fragrances:', error);
        document.getElementById('battleArea').innerHTML = '<div class="loading-message">Failed to load fragrances.</div>';
      }
    }

    async function trackFragranceWin(fragrance) {
      const currentMonth = getCurrentMonth();

      try {
        await supabase.from('fragrance_battles').insert({
          fragrance_name: fragrance.name,
          fragrance_brand: fragrance.brand,
          fragrance_image: fragrance.image,
          battle_month: currentMonth
        });

        await supabase.rpc('increment_fragrance_win', {
          p_name: fragrance.name,
          p_brand: fragrance.brand,
          p_image: fragrance.image,
          p_month: currentMonth
        });

        loadLeaderboard();
      } catch (error) {
        console.error('Error tracking fragrance win:', error);
      }
    }

    function setupFilterButtons() {
      const filterButtons = document.querySelectorAll('.filter-btn');
      filterButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const category = btn.dataset.category;
          filterButtons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilter(category);
        });
      });
    }

    function applyFilter(category) {
      currentCategory = category;
      currentChampion = null;
      currentStreak = 0;
      usedFragrancePairs.clear();
      document.getElementById('streakValue').textContent = '0';

      if (category === 'Top Rated') {
        // Top rated - highly regarded luxury brands
        filteredFragrances = fragrances.filter(f => {
          const brand = (f.brand || '').toLowerCase();
          return brand.includes('creed') || brand.includes('tom ford') ||
                 brand.includes('dior') || brand.includes('chanel') ||
                 brand.includes('louis vuitton');
        });
      } else {
        // Filter by category
        filteredFragrances = fragrances.filter(f =>
          f.categories && f.categories.includes(category)
        );
      }

      if (filteredFragrances.length < 2) {
        showNoMoreBattles();
      } else {
        startNewBattle();
      }

      loadLeaderboard();
    }

    function showNoMoreBattles() {
      const battleArea = document.getElementById('battleArea');
      battleArea.innerHTML = `
        <div class="no-more-battles">
          <div class="no-more-battles-emoji">🏆</div>
          <div class="no-more-battles-message">You've reached the final winner for this category!</div>
          <button class="restart-button" onclick="restartBattles()">Restart Battles</button>
        </div>
      `;
    }

    window.restartBattles = function() {
      applyFilter(currentCategory);
    }

   async function loadLeaderboard() {
  const currentMonth = getCurrentMonth();
  const thisReqId = ++leaderboardReqId;
  const leaderboardList = document.getElementById('leaderboardList');

  leaderboardList.innerHTML = '<div class="leaderboard-empty">Loading leaderboard...</div>';

  try {
    const { data, error } = await supabase
      .from('fragrance_leaderboard')
      .select('*')
      .eq('battle_month', currentMonth)
      .order('win_count', { ascending: false })
      .limit(300); // IMPORTANT: avoid huge payloads

    if (thisReqId !== leaderboardReqId) return; // ignore stale

    if (error) {
      console.error('Error loading leaderboard:', error);
      leaderboardList.innerHTML =
        `<div class="leaderboard-empty">Error loading leaderboard: ${error.message || 'unknown error'}</div>`;
      return;
    }

    const rows = data || [];

    // If we don't have fragrance data yet, just show the raw leaderboard.
    if (!fragrances || fragrances.length === 0) {
      displayLeaderboard(rows.slice(0, 10));
      return;
    }

    // Filter by category WITHOUT breaking if a perfume isn't found in the index
    const filteredRows = rows.filter(row => {
      if (currentCategory === 'Top Rated') {
        // For Top Rated, show leaderboard regardless of index lookup
        return true;
      }

      const key = `${(row.fragrance_name || '').trim().toLowerCase()}|${(row.fragrance_brand || '').trim().toLowerCase()}`;
      const frag = fragranceIndex.get(key);

      // If we can't find the perfume in our JSON dataset, DON'T exclude it.
      // Otherwise the leaderboard can become empty and look "broken".
      if (!frag) return true;

      return Array.isArray(frag.categories) && frag.categories.includes(currentCategory);
    });

    // Show top 10 after filtering
    displayLeaderboard(filteredRows.slice(0, 10));
  } catch (err) {
    if (thisReqId !== leaderboardReqId) return;
    console.error('Error loading leaderboard:', err);
    leaderboardList.innerHTML =
      `<div class="leaderboard-empty">Error loading leaderboard: ${String(err.message || err)}</div>`;
  }
}

    function displayLeaderboard(leaderboardData) {
      const leaderboardList = document.getElementById('leaderboardList');

      if (leaderboardData.length === 0) {
        leaderboardList.innerHTML = '<div class="leaderboard-empty">No battles yet this month. Be the first to vote!</div>';
        return;
      }

      leaderboardList.innerHTML = leaderboardData.map((item, index) => {
        const rank = index + 1;
        const rankClass = `rank-${rank}`;
        const winText = item.win_count === 1 ? 'Win' : 'Wins';

       const fragranceUrl = `fragrance.html?brand=${encodeURIComponent(item.fragrance_brand || '')}&name=${encodeURIComponent(item.fragrance_name || '')}`;
        return `
          <a href="${fragranceUrl}" class="leaderboard-item">
            <div class="leaderboard-rank ${rankClass}">#${rank}</div>
            <img src="${item.fragrance_image || 'https://via.placeholder.com/80x80?text=No+Image'}" alt="${item.fragrance_name}" class="leaderboard-image" />
            <div class="leaderboard-info">
              <div class="leaderboard-brand">${item.fragrance_brand}</div>
              <div class="leaderboard-name">${item.fragrance_name}</div>
            </div>
            <div class="leaderboard-wins">${item.win_count} ${winText}</div>
          </a>
        `;
      }).join('');
    }

    function getRandomFragrance(excludeFragrance = null) {
      let availableFragrances = filteredFragrances;
      if (excludeFragrance) {
        availableFragrances = filteredFragrances.filter(f =>
          !(f.name === excludeFragrance.name && f.brand === excludeFragrance.brand)
        );
      }

      if (availableFragrances.length === 0) {
        return filteredFragrances.length > 0 ? filteredFragrances[Math.floor(Math.random() * filteredFragrances.length)] : null;
      }

      return availableFragrances[Math.floor(Math.random() * availableFragrances.length)];
    }

    function getPairKey(frag1, frag2) {
      const names = [frag1.name + '|' + frag1.brand, frag2.name + '|' + frag2.brand].sort();
      return names.join('::');
    }

    function hasUnusedPairs() {
      if (filteredFragrances.length < 2) return false;

      const totalPossiblePairs = (filteredFragrances.length * (filteredFragrances.length - 1)) / 2;
      return usedFragrancePairs.size < totalPossiblePairs;
    }

    function getUnusedPair() {
      const maxAttempts = 100;
      let attempts = 0;

      while (attempts < maxAttempts && hasUnusedPairs()) {
        const frag1 = filteredFragrances[Math.floor(Math.random() * filteredFragrances.length)];
        let frag2 = getRandomFragrance(frag1);

        if (!frag2) return null;

        const pairKey = getPairKey(frag1, frag2);
        if (!usedFragrancePairs.has(pairKey)) {
          usedFragrancePairs.add(pairKey);
          return [frag1, frag2];
        }
        attempts++;
      }

      return null;
    }

    function createFragranceCard(fragrance, position) {
      const accords = Array.isArray(fragrance.main_accords) ? fragrance.main_accords.slice(0, 5) : [];
      const isChampion = currentChampion && currentChampion.name === fragrance.name && currentChampion.brand === fragrance.brand;

      return `
        <div class="fragrance-battle-card ${isChampion ? 'winner' : ''}" data-position="${position}">
          <div class="card-image-container">
            <img src="${fragrance.image || 'https://via.placeholder.com/300x300?text=No+Image'}" alt="${fragrance.name}" />
          </div>
          <div class="card-content">
            <div class="card-brand">${fragrance.brand}</div>
            <div class="card-name">${fragrance.name}</div>
            <div class="card-accords">
              <div class="card-accords-title">Key Accords</div>
              <div class="accord-tags">
                ${accords.map(accord => `<span class="accord-tag">${accord}</span>`).join('')}
              </div>
            </div>
            <button class="choose-button">
              Choose
            </button>
          </div>
        </div>
      `;
    }

    function startNewBattle() {
      if (filteredFragrances.length < 2) {
        showNoMoreBattles();
        return;
      }

      let fragrance1, fragrance2;

      // If there's a current champion, they continue to the next round
      if (currentChampion) {
        fragrance1 = currentChampion;

        // Get a new opponent that hasn't faced the champion yet
        let attempts = 0;
        const maxAttempts = 50;

        while (attempts < maxAttempts) {
          fragrance2 = getRandomFragrance(currentChampion);

          if (!fragrance2) {
            // No more opponents available
            showNoMoreBattles();
            return;
          }

          const pairKey = getPairKey(fragrance1, fragrance2);
          if (!usedFragrancePairs.has(pairKey)) {
            usedFragrancePairs.add(pairKey);
            break;
          }

          attempts++;
        }

        if (attempts >= maxAttempts) {
          // Champion has faced everyone
          showNoMoreBattles();
          return;
        }
      } else {
        // No champion yet, get a fresh pair
        const unusedPair = getUnusedPair();

        if (!unusedPair) {
          showNoMoreBattles();
          return;
        }

        [fragrance1, fragrance2] = unusedPair;
      }

      window.battleFragrances = [fragrance1, fragrance2];

      const battleArea = document.getElementById('battleArea');
      battleArea.innerHTML = `
        <div class="battle-container">
          ${createFragranceCard(fragrance1, 0)}
          ${createFragranceCard(fragrance2, 1)}
        </div>
      `;

      attachCardClickHandlers();
    }

    function attachCardClickHandlers() {
      const cards = document.querySelectorAll('.fragrance-battle-card');
      cards.forEach((card, index) => {
        card.addEventListener('click', (e) => {
          if (!isAnimating) {
            chooseFragrance(index);
          }
        });
      });
    }

    async function chooseFragrance(position) {
  if (isAnimating) return;

  isAnimating = true;
  const selectedFragrance = window.battleFragrances[position];
  const losingPosition = position === 0 ? 1 : 0;

  const cards = document.querySelectorAll('.fragrance-battle-card');
  const losingCard = cards[losingPosition];

  if (currentChampion && currentChampion.name === selectedFragrance.name && currentChampion.brand === selectedFragrance.brand) {
    currentStreak++;
  } else {
    currentChampion = selectedFragrance;
    currentStreak = 1;
  }

  document.getElementById('streakValue').textContent = currentStreak;

  await trackFragranceWin(selectedFragrance);
await trackUserBattleCompletionAndPoints();

  if (losingPosition === 0) {
    losingCard.classList.add('slide-out-left');
  } else {
    losingCard.classList.add('slide-out-right');
  }

  setTimeout(() => {
    isAnimating = false;
    startNewBattle();
  }, 500);
}

/* ✅ START THE APP */
document.addEventListener('DOMContentLoaded', () => {
  loadFragrances();
});

</script>
