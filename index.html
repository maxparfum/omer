<script type="module">
  function normalize(s) {
    return (s || '')
      .toString()
      .trim()
      .toLowerCase()
      .replace(/[’']/g, "'")
      .replace(/[^a-z0-9\s-]+/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }
  function normalizeFragranceKey(fragrance) {
  return `${normalize(fragrance?.brand)}::${normalize(fragrance?.name)}`;
}

function ensureArray(value) {
  if (Array.isArray(value)) return value;
  if (typeof value === 'string' && value.trim() !== '') {
    return value.split(/[,;|]/).map(x => x.trim()).filter(Boolean);
  }
  return [];
}

function normalizeFragranceRecord(fragrance) {
  return {
    ...fragrance,
    top_notes: ensureArray(fragrance.top_notes),
    middle_notes: ensureArray(fragrance.middle_notes),
    base_notes: ensureArray(fragrance.base_notes),
    main_accords: ensureArray(fragrance.main_accords),
    dupes: ensureArray(fragrance.dupes),
    matched_by: fragrance.matched_by || 'none'
  };
}

function mergeFragranceSources(jsonFragrances, liveFragrances) {
  const mergedMap = new Map();

  (jsonFragrances || []).forEach(fragrance => {
    const normalized = normalizeFragranceRecord(fragrance);
    mergedMap.set(normalizeFragranceKey(normalized), normalized);
  });

  (liveFragrances || []).forEach(fragrance => {
    const normalized = normalizeFragranceRecord(fragrance);
    mergedMap.set(normalizeFragranceKey(normalized), normalized);
  });

  return Array.from(mergedMap.values());
}

  // Try to pull a "display name" for the dupe from various possible shapes
  function pickDupeName(dupe) {
    if (!dupe) return null;
    if (typeof dupe === 'string') return dupe;

    // common keys we might have
    return (
      dupe.dupe ||
      dupe.name ||
      dupe.title ||
      dupe.fragrance ||
      dupe.dupe_name ||
      dupe.clone ||
      dupe.clone_name ||
      null
    );
  }

  // Try to sort dupes by confidence/score if present
  function sortDupes(dupes) {
    if (!Array.isArray(dupes)) return [];
    return [...dupes].sort((a, b) => {
      const as = (a?.score ?? a?.match_score ?? a?.confidence ?? a?.similarity ?? 0);
      const bs = (b?.score ?? b?.match_score ?? b?.confidence ?? b?.similarity ?? 0);
      return (bs || 0) - (as || 0);
    });
  }

  function pickTopDupe(item) {
    const dupes = sortDupes(item?.dupes);
    if (!dupes.length) return null;
    return pickDupeName(dupes[0]);
  }

  // If dataset has a match score somewhere
  function pickMatchScore(item) {
    // sometimes on item, sometimes on top dupe object
    const direct =
      item?.match_score ??
      item?.top_match_score ??
      item?.dupe_match_score ??
      null;

    if (direct !== null && direct !== undefined && direct !== '') return direct;

    const dupes = sortDupes(item?.dupes);
    if (dupes.length) {
      return dupes[0]?.match_score ?? dupes[0]?.score ?? dupes[0]?.confidence ?? dupes[0]?.similarity ?? null;
    }

    return null;
  }

  function formatRating(val) {
    if (val === null || val === undefined || val === '') return 'N/A';
    const num = Number(val);
    if (Number.isNaN(num)) return 'N/A';
    return num.toFixed(2); // your dataset looks like 1.42, 2.41 etc.
  }

  function findBestMatch(data, queryName) {
    const q = normalize(queryName);
    if (!q) return null;

    // 1) exact match on name
    let best = data.find(it => normalize(it?.name) === q);
    if (best) return best;

    // 2) contains match (handles “sauvage” vs “sauvage eau de toilette”)
    const contains = data.filter(it => normalize(it?.name).includes(q));
    if (contains.length === 1) return contains[0];
    if (contains.length > 1) {
      // pick the shortest name as usually the "base" one
      contains.sort((a, b) => normalize(a.name).length - normalize(b.name).length);
      return contains[0];
    }

    // 3) reverse contains (handles query being longer)
    const reverse = data.filter(it => q.includes(normalize(it?.name)));
    if (reverse.length === 1) return reverse[0];

    return null;
  }

  async function loadTrendingCardData() {
    const cards = [...document.querySelectorAll('.trending-card')];
    if (!cards.length) return;

    let data = [];
    try {
      const res = await fetch('fragrances_merged.json', { cache: 'no-store' });
      data = await res.json();
      if (!Array.isArray(data)) throw new Error('fragrances_merged.json is not an array');
    } catch (e) {
      console.error('Could not load fragrances_merged.json', e);
      return;
    }

    for (const card of cards) {
      // get name=... from the card href
let nameParam = '';
try {
  const href = card.getAttribute('href') || '';
  const url = new URL(href, window.location.origin);
  nameParam = (url.searchParams.get('name') || '').trim();
} catch {}

const item = nameParam ? findBestMatch(data, nameParam) : null;

      // Rating (uses rating_value)
      const ratingEl = card.querySelector('.rating-value');
      if (ratingEl) {
        ratingEl.textContent = item ? formatRating(item.rating_value) : 'N/A';
      }

      // Top dupe (only overwrite if dataset has one; otherwise keep your existing text)
      const topDupeRow = card.querySelector('.stat-item .stat-label'); // your "Top Dupe: ..."
      if (topDupeRow && item) {
        const topDupe = pickTopDupe(item);
        if (topDupe) topDupeRow.textContent = `Top Dupe: ${topDupe}`;
      }

      // Match score (only overwrite if dataset has one)
      const matchEl = card.querySelector('.stat-item.gold .stat-value'); // "Match Score: XX%"
      if (matchEl && item) {
        const ms = pickMatchScore(item);
        if (ms !== null && ms !== undefined && ms !== '') {
          const n = Number(ms);
          const pct =
            Number.isFinite(n)
              ? (n <= 1 ? Math.round(n * 100) : Math.round(n)) + '%'
              : String(ms).includes('%') ? String(ms) : `${ms}%`;
          matchEl.textContent = `Match Score: ${pct}`;
        }
      }
    }
  }

  document.addEventListener('DOMContentLoaded', loadTrendingCardData);
</script>

<script type="module">
import { supabase } from './supabase.js';
import { getCommunityPulse, timeAgo, avatarHtml } from './community-activity.js';

const FALLBACKS = [
  { icon: '⭐', text: 'Start rating fragrances', href: 'search.html?q=' },
  { icon: '✍️', text: 'Be the first to review a scent', href: 'search.html?q=' },
  { icon: '🧴', text: 'Build your collection', href: 'collection.html' },
  { icon: '🤝', text: 'Join the fragrance community', href: 'forum.html' },
];

function activityCard(item) {
  const tag = item.url ? 'a' : 'div';
  const href = item.url ? `href="${item.url}"` : '';
  return `<${tag} class="cp-card" ${href}>
    <div class="cp-card-top">
      ${avatarHtml(item.avatarUrl, item.actor)}
      <span class="cp-actor">${item.actor}</span>
    </div>
    <p class="cp-action">${item.action}</p>
    <span class="cp-time">${timeAgo(item.createdAt)}</span>
  </${tag}>`;
}

function fallbackCard(f) {
  return `<a class="cp-card cp-card-fallback" href="${f.href}">
    <div class="cp-fallback-icon">${f.icon}</div>
    <p class="cp-fallback-text">${f.text}</p>
  </a>`;
}

async function loadCommunityPulse() {
  const container = document.getElementById('cp-cards');
  if (!container) return;

  const items = await getCommunityPulse(12);
  const display = items.slice(0, 4);

  if (!display.length) {
    container.innerHTML = FALLBACKS.map(fallbackCard).join('');
    return;
  }

  let html = display.map(activityCard).join('');
  if (display.length < 4) {
    const needed = 4 - display.length;
    html += FALLBACKS.slice(0, needed).map(fallbackCard).join('');
  }
  container.innerHTML = html;
}

// Debounce so rapid bursts of realtime events trigger only one refresh
let _pulseDebounce = null;
function debouncedRefresh() {
  clearTimeout(_pulseDebounce);
  _pulseDebounce = setTimeout(loadCommunityPulse, 1500);
}

function subscribeToActivityEvents() {
  try {
    const channel = supabase
      .channel('community-pulse-home')
      .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'activity_events',
      }, debouncedRefresh)
      .subscribe((status) => {
        if (status === 'CHANNEL_ERROR') {
          console.warn('[CommunityPulse] realtime subscription error — live updates unavailable');
        }
      });

    window.addEventListener('beforeunload', () => {
      supabase.removeChannel(channel);
    });
  } catch (err) {
    console.warn('[CommunityPulse] could not subscribe to realtime:', err.message);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadCommunityPulse();
  subscribeToActivityEvents();
});
</script>
