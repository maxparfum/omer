  <script>
    const mobileHamburger = document.getElementById('mobileHamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuClose = document.getElementById('mobileMenuClose');
    const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
    const mobileGamesToggle = document.getElementById('mobileGamesToggle');
    const mobileGamesMenu = document.getElementById('mobileGamesMenu');
    const mobileCommunityToggle = document.getElementById('mobileCommunityToggle');
    const mobileCommunityMenu = document.getElementById('mobileCommunityMenu');
    const gamesToggle = document.getElementById('gamesToggle');
    const gamesMenu = document.getElementById('gamesMenu');
    const communityToggle = document.getElementById('communityToggle');
    const communityMenu = document.getElementById('communityMenu');

    function openMobileMenu() {
      mobileMenu.classList.add('active');
      mobileMenuOverlay.classList.add('active');
      mobileHamburger.classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeMobileMenu() {
      mobileMenu.classList.remove('active');
      mobileMenuOverlay.classList.remove('active');
      mobileHamburger.classList.remove('active');
      if (mobileGamesToggle) mobileGamesToggle.classList.remove('active');
      if (mobileGamesMenu) mobileGamesMenu.classList.remove('active');
      document.body.style.overflow = '';
    }

    if (mobileHamburger) mobileHamburger.addEventListener('click', openMobileMenu);
    if (mobileMenuClose) mobileMenuClose.addEventListener('click', closeMobileMenu);
    if (mobileMenuOverlay) mobileMenuOverlay.addEventListener('click', closeMobileMenu);

    if (mobileGamesToggle && mobileGamesMenu) {
      mobileGamesToggle.addEventListener('click', () => {
        mobileGamesToggle.classList.toggle('active');
        mobileGamesMenu.classList.toggle('active');
      });
      mobileGamesMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', closeMobileMenu));
    }
    if (mobileCommunityToggle && mobileCommunityMenu) {
      mobileCommunityToggle.addEventListener('click', () => {
        mobileCommunityToggle.classList.toggle('active');
        mobileCommunityMenu.classList.toggle('active');
      });
      mobileCommunityMenu.querySelectorAll('a').forEach(l => l.addEventListener('click', closeMobileMenu));
    }

    if (gamesToggle && gamesMenu) {
      gamesToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        gamesMenu.classList.toggle('open');
        communityMenu.classList.remove('open');
      });
    }
    if (communityToggle && communityMenu) {
      communityToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        communityMenu.classList.toggle('open');
        gamesMenu.classList.remove('open');
      });
    }
    document.addEventListener('click', () => {
      if (gamesMenu) gamesMenu.classList.remove('open');
      if (communityMenu) communityMenu.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeMobileMenu();
        if (gamesMenu) gamesMenu.classList.remove('open');
        if (communityMenu) communityMenu.classList.remove('open');
      }
    });
  </script>
